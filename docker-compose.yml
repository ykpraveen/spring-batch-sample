services:
  postgres:
    image: postgres:16-alpine
    container_name: spring-batch-postgres
    environment:
      POSTGRES_DB: batch_db
      POSTGRES_USER: batch_user
      POSTGRES_PASSWORD: batch_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batch_user -d batch_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: spring-batch-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/batch_db
      SPRING_DATASOURCE_USERNAME: batch_user
      SPRING_DATASOURCE_PASSWORD: batch_password
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
